[paths]
cache_dir = ".cache"
samples_dir = "samples"
runs_dir = "runs"
reports_dir = "reports"
cleanup_task_workspaces = true

[agent]
type = "codex"           # "codex" or "claude"
model = ""
timeout_sec = 1800

[agent.codex]
sandbox = "danger-full-access"
skip_git_repo_check = true
extra_args = ["--color", "never"]

[agent.claude]
extra_args = []

[[skills]]
id = "taylorism"
name = "Taylorism"
path = "../泰勒主义/SKILL.md"

[[skills]]
id = "keynesian"
name = "Keynesian Engineer"
path = "../凯恩斯主义/keynesian-engineer/SKILL.md"

[[skills]]
id = "pragmatist"
name = "Pragmatist Engineering"
path = "../实用主义/pragmatist-engineering/SKILL.md"

[[skills]]
id = "evolutionary"
name = "Evolutionary Execution"
path = "../社会达尔文主义-演化/evolutionary-execution/SKILL.md"

[[skills]]
id = "marxist"
name = "Marxist Engineering Method"
path = "../马克思/marxist-engineering-method/SKILL.md"

[[variants]]
id = "baseline"
name = "Baseline"
skills = []

[[variants]]
id = "taylorism_only"
name = "Taylorism Only"
skills = ["taylorism"]

[[variants]]
id = "keynesian_only"
name = "Keynesian Only"
skills = ["keynesian"]

[[variants]]
id = "pragmatist_only"
name = "Pragmatist Only"
skills = ["pragmatist"]

[[variants]]
id = "evolutionary_only"
name = "Evolutionary Only"
skills = ["evolutionary"]

[[variants]]
id = "marxist_only"
name = "Marxist Only"
skills = ["marxist"]

[[variants]]
id = "all_skills"
name = "All Skills"
skills = ["taylorism", "keynesian", "pragmatist", "evolutionary", "marxist"]

[benchmarks.aider_polyglot]
enabled = true
sample_size = 10
seed = 42
repo_url = "https://github.com/Aider-AI/polyglot-benchmark"

[benchmarks.swebench_lite]
enabled = true
sample_size = 10
seed = 42
dataset_name = "SWE-bench/SWE-bench_Lite"
split = "test"

[benchmarks.swebench_verified]
enabled = true
sample_size = 10
seed = 42
dataset_name = "SWE-bench/SWE-bench_Verified"
split = "test"

[benchmarks.terminal_bench]
enabled = true
sample_size = 10
seed = 42
repo_url = "https://github.com/harbor-framework/terminal-bench"
task_root = "original-tasks"
tb_output_dir = "tb_runs"
tb_cleanup = true
tb_n_concurrent = 1

[benchmarks.mathvista]
enabled = true
sample_size = 50
seed = 42
dataset_name = "AI4Math/MathVista"
split = "testmini"

[benchmarks.simpleqa_verified]
enabled = true
sample_size = 100
seed = 42
dataset_name = "google/simpleqa-verified"
dataset_config = "simpleqa_verified"
split = "eval"

[benchmarks.hle]
enabled = true
sample_size = 100
seed = 42
dataset_name = "cais/hle"
split = "test"
